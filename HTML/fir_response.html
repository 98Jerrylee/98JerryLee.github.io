<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIR Filter Interactive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 24px;
    color: #24292f;
    background: #fff;
    line-height: 1.6;
  }
  h3 {
    font-size: 16px;
    font-weight: 600;
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #d0d7de;
  }
  h3:first-child { margin-top: 0; }
  .section { margin-bottom: 20px; }
  .label { font-size: 13px; color: #656d76; margin-bottom: 6px; }
  .formula { font-size: 18px; margin-bottom: 4px; overflow-x: auto; }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .ctrl-row label { font-size: 13px; color: #656d76; min-width: 100px; }
  .ctrl-row input[type="range"] { flex: 1; }
  .ctrl-row select {
    padding: 4px 8px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  .ctrl-row .val { font-size: 13px; font-weight: 500; min-width: 90px; text-align: right; }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 14px 0;
  }
  .metric-card {
    background: #f6f8fa;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .metric-card .mc-label { font-size: 11px; color: #656d76; margin-bottom: 3px; }
  .metric-card .mc-value { font-size: 16px; font-weight: 500; color: #24292f; }
  .chart-box { position: relative; height: 280px; margin: 16px 0; }
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #d0d7de;
    margin-bottom: 16px;
  }
  .tab-bar button {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    color: #656d76;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-bar button.active { color: #2f81f7; border-bottom-color: #2f81f7; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .coeff-display {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    background: #f6f8fa;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 12px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.8;
  }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  th {
    padding: 6px 12px;
    text-align: left;
    color: #656d76;
    font-weight: 400;
    border-bottom: 1px solid #d0d7de;
  }
  th:not(:first-child) { text-align: right; }
  td { padding: 5px 12px; border-bottom: 1px solid #eef0f2; }
  td:not(:first-child) { text-align: right; }
  .note {
    font-size: 12px;
    color: #656d76;
    background: #f6f8fa;
    border-left: 3px solid #2f81f7;
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    margin: 12px 0;
  }
  @media (max-width: 600px) {
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    body { padding: 12px; }
  }
</style>
</head>
<body>

<h3>FIR 滤波器公式</h3>

<div class="section">
  <p class="label">差分方程 (时域)</p>
  <div class="formula" id="eq_time"></div>
</div>
<div class="section">
  <p class="label">Z 域传递函数</p>
  <div class="formula" id="eq_z"></div>
</div>
<div class="section">
  <p class="label">频率响应 (令 z = e^jw)</p>
  <div class="formula" id="eq_freq"></div>
</div>
<div class="section">
  <p class="label">幅度响应</p>
  <div class="formula" id="eq_mag"></div>
</div>

<h3>交互控制面板</h3>

<div class="section">
  <div class="ctrl-row">
    <label>滤波器类型</label>
    <select id="ftype">
      <option value="lowpass">低通 (Lowpass)</option>
      <option value="highpass">高通 (Highpass)</option>
      <option value="bandpass">带通 (Bandpass)</option>
    </select>
  </div>
  <div class="ctrl-row">
    <label>窗函数</label>
    <select id="wtype">
      <option value="rectangular">矩形窗 (Rectangular)</option>
      <option value="hamming" selected>汉明窗 (Hamming)</option>
      <option value="hanning">汉宁窗 (Hanning)</option>
      <option value="blackman">布莱克曼窗 (Blackman)</option>
    </select>
  </div>
  <div class="ctrl-row">
    <label>阶数 N</label>
    <input type="range" min="2" max="128" value="16" step="1" id="order_slider">
    <span class="val" id="order_val">16</span>
  </div>
  <div class="ctrl-row">
    <label>采样率 fs (MHz)</label>
    <input type="range" min="1" max="200" value="40" step="1" id="fs_slider">
    <span class="val" id="fs_val">40 MHz</span>
  </div>
  <div class="ctrl-row">
    <label>截止频率 fc (MHz)</label>
    <input type="range" min="0.1" max="100" value="5" step="0.1" id="fc_slider">
    <span class="val" id="fc_val">5.0 MHz</span>
  </div>
  <div class="ctrl-row" id="fc2_row" style="display:none;">
    <label>上截止 fc2 (MHz)</label>
    <input type="range" min="0.1" max="100" value="15" step="0.1" id="fc2_slider">
    <span class="val" id="fc2_val">15.0 MHz</span>
  </div>
</div>

<div class="metric-grid">
  <div class="metric-card">
    <div class="mc-label">阶数 (tap 数)</div>
    <div class="mc-value" id="m_order">N=16 (17 taps)</div>
  </div>
  <div class="metric-card">
    <div class="mc-label">群延迟</div>
    <div class="mc-value" id="m_delay">8 samples</div>
  </div>
  <div class="metric-card">
    <div class="mc-label">过渡带宽</div>
    <div class="mc-value" id="m_trans">--</div>
  </div>
  <div class="metric-card">
    <div class="mc-label">阻带衰减</div>
    <div class="mc-value" id="m_atten">--</div>
  </div>
</div>

<div class="note" id="win_note">汉明窗: 阻带衰减约 -43 dB, 主瓣宽度 8pi/(N+1)</div>

<h3>响应曲线</h3>

<div class="tab-bar">
  <button class="active" onclick="switchTab('mag')">幅度响应 (dB)</button>
  <button onclick="switchTab('linear')">幅度响应 (线性)</button>
  <button onclick="switchTab('phase')">相位响应</button>
  <button onclick="switchTab('impulse')">冲激响应 h[n]</button>
  <button onclick="switchTab('coeff')">系数列表</button>
</div>

<div class="tab-content active" id="tab_mag">
  <div class="chart-box"><canvas id="chart_mag"></canvas></div>
</div>
<div class="tab-content" id="tab_linear">
  <div class="chart-box"><canvas id="chart_linear"></canvas></div>
</div>
<div class="tab-content" id="tab_phase">
  <div class="chart-box"><canvas id="chart_phase"></canvas></div>
</div>
<div class="tab-content" id="tab_impulse">
  <div class="chart-box"><canvas id="chart_impulse"></canvas></div>
</div>
<div class="tab-content" id="tab_coeff">
  <p class="label">h[n] 系数值 (浮点, 可直接用于计算或 MATLAB)</p>
  <div class="coeff-display" id="coeff_text"></div>
</div>

<h3>关键频率点</h3>
<table id="freq_table"></table>

<script>
var kopts = {displayMode: true, throwOnError: false};
katex.render("y[n] = \\sum_{k=0}^{N} h[k] \\cdot x[n-k] = h[0] \\cdot x[n] + h[1] \\cdot x[n\\!-\\!1] + \\cdots + h[N] \\cdot x[n\\!-\\!N]", document.getElementById("eq_time"), kopts);
katex.render("H(z) = \\sum_{k=0}^{N} h[k] \\cdot z^{-k}", document.getElementById("eq_z"), kopts);
katex.render("H(e^{j\\omega}) = \\sum_{k=0}^{N} h[k] \\cdot e^{-jk\\omega}", document.getElementById("eq_freq"), kopts);
katex.render("|H(e^{j\\omega})| = \\left| \\sum_{k=0}^{N} h[k] \\cdot e^{-jk\\omega} \\right|, \\quad \\omega = \\frac{2\\pi f}{f_s}", document.getElementById("eq_mag"), kopts);

function sinc(x) { return Math.abs(x) < 1e-10 ? 1.0 : Math.sin(Math.PI * x) / (Math.PI * x); }

function getWindow(type, N) {
    var w = new Array(N + 1);
    for (var n = 0; n <= N; n++) {
        switch (type) {
            case "rectangular": w[n] = 1.0; break;
            case "hamming": w[n] = 0.54 - 0.46 * Math.cos(2 * Math.PI * n / N); break;
            case "hanning": w[n] = 0.5 - 0.5 * Math.cos(2 * Math.PI * n / N); break;
            case "blackman": w[n] = 0.42 - 0.5 * Math.cos(2 * Math.PI * n / N) + 0.08 * Math.cos(4 * Math.PI * n / N); break;
            default: w[n] = 1.0;
        }
    }
    return w;
}

function designFIR(type, N, fc, fc2, fs, winType) {
    var wc = 2 * fc / fs;
    var wc2 = fc2 ? 2 * fc2 / fs : wc;
    var M = N / 2;
    var h = new Array(N + 1);
    var win = getWindow(winType, N);
    for (var n = 0; n <= N; n++) {
        var nm = n - M;
        switch (type) {
            case "lowpass":  h[n] = wc * sinc(wc * nm); break;
            case "highpass": h[n] = sinc(nm) - wc * sinc(wc * nm); break;
            case "bandpass": h[n] = wc2 * sinc(wc2 * nm) - wc * sinc(wc * nm); break;
        }
        h[n] *= win[n];
    }
    var gain, w0, re, im;
    if (type === "lowpass") {
        gain = 0;
        for (var i = 0; i <= N; i++) gain += h[i];
    } else if (type === "highpass") {
        gain = 0;
        for (var i = 0; i <= N; i++) gain += h[i] * Math.pow(-1, i);
    } else {
        w0 = Math.PI * (wc + wc2) / 2;
        re = 0; im = 0;
        for (var i = 0; i <= N; i++) {
            re += h[i] * Math.cos(i * w0);
            im -= h[i] * Math.sin(i * w0);
        }
        gain = Math.sqrt(re * re + im * im);
    }
    if (Math.abs(gain) > 1e-10) {
        for (var i = 0; i <= N; i++) h[i] /= gain;
    }
    return h;
}

function freqResponse(h, f, fs) {
    var w = 2 * Math.PI * f / fs;
    var re = 0, im = 0;
    for (var k = 0; k < h.length; k++) {
        re += h[k] * Math.cos(k * w);
        im -= h[k] * Math.sin(k * w);
    }
    return {re: re, im: im, mag: Math.sqrt(re * re + im * im), phase: Math.atan2(im, re)};
}

function toDb(mag) { return mag < 1e-12 ? -120 : 20 * Math.log10(mag); }

var charts = {};
function initChart(id, ylabel, ymin, ymax, color) {
    var ctx = document.getElementById(id).getContext("2d");
    charts[id] = new Chart(ctx, {
        type: "line",
        data: { labels: [], datasets: [{
            label: ylabel, data: [],
            borderColor: color || "#2f81f7",
            backgroundColor: (color || "rgba(47,129,247,") + "0.06)",
            fill: id === "chart_mag" || id === "chart_linear",
            borderWidth: 1.5, pointRadius: 0, tension: 0.2
        }]},
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: {
                x: { title: {display: true, text: "频率 (MHz)", font:{size:12}}, ticks:{font:{size:10}, maxTicksLimit:15} },
                y: { title: {display: true, text: ylabel, font:{size:12}}, ticks:{font:{size:10}}, min: ymin, max: ymax }
            },
            plugins: { legend: {display: false}, tooltip: { callbacks: { label: function(c) { return c.parsed.y.toFixed(2); } } } }
        }
    });
}
function initImpulseChart() {
    var ctx = document.getElementById("chart_impulse").getContext("2d");
    charts["chart_impulse"] = new Chart(ctx, {
        type: "bar",
        data: { labels: [], datasets: [{ label: "h[n]", data: [], backgroundColor: "rgba(47,129,247,0.6)", borderColor: "#2f81f7", borderWidth: 1 }]},
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: {
                x: { title: {display: true, text: "n", font:{size:12}}, ticks:{font:{size:10}, maxTicksLimit:30} },
                y: { title: {display: true, text: "h[n]", font:{size:12}}, ticks:{font:{size:10}} }
            },
            plugins: { legend: {display: false} }
        }
    });
}

initChart("chart_mag", "幅度 (dB)", -100, 5, "#2f81f7");
initChart("chart_linear", "幅度 (线性)", -0.05, 1.15, "#1a7f37");
initChart("chart_phase", "相位 (rad)", -4, 4, "#8250df");
initImpulseChart();

function switchTab(name) {
    document.querySelectorAll(".tab-bar button").forEach(function(b) { b.classList.remove("active"); });
    document.querySelectorAll(".tab-content").forEach(function(t) { t.classList.remove("active"); });
    document.getElementById("tab_" + name).classList.add("active");
    var btns = document.querySelectorAll(".tab-bar button");
    var names = ["mag","linear","phase","impulse","coeff"];
    for (var i = 0; i < names.length; i++) { if (names[i] === name) btns[i].classList.add("active"); }
    if (charts["chart_" + name]) charts["chart_" + name].resize();
}

var winInfo = {
    rectangular: {atten: "~-13 dB (很差)", note: "矩形窗: 阻带衰减仅 -13 dB, 但主瓣最窄, 频率分辨率最高"},
    hamming:     {atten: "~-43 dB", note: "汉明窗: 阻带衰减约 -43 dB, 主瓣宽度是矩形窗的 2 倍, 最常用的工程窗"},
    hanning:     {atten: "~-31 dB", note: "汉宁窗: 阻带衰减约 -31 dB, 旁瓣下降速度快 (-18 dB/oct), 频谱泄漏较小"},
    blackman:    {atten: "~-58 dB", note: "布莱克曼窗: 阻带衰减约 -58 dB, 但主瓣最宽, 过渡带最宽, 适合高阻带要求"}
};

function updateAll() {
    var ftype = document.getElementById("ftype").value;
    var wtype = document.getElementById("wtype").value;
    var N = parseInt(document.getElementById("order_slider").value);
    if (N % 2 !== 0) { N++; document.getElementById("order_slider").value = N; }
    var fs = parseFloat(document.getElementById("fs_slider").value) * 1e6;
    var fc = parseFloat(document.getElementById("fc_slider").value) * 1e6;
    var fc2 = parseFloat(document.getElementById("fc2_slider").value) * 1e6;

    document.getElementById("fc2_row").style.display = (ftype === "bandpass") ? "flex" : "none";
    if (fc >= fs / 2) { fc = fs / 2 * 0.9; document.getElementById("fc_slider").value = (fc / 1e6).toFixed(1); }
    if (fc2 >= fs / 2) { fc2 = fs / 2 * 0.9; document.getElementById("fc2_slider").value = (fc2 / 1e6).toFixed(1); }
    if (ftype === "bandpass" && fc2 <= fc) { fc2 = fc + 1e6; document.getElementById("fc2_slider").value = (fc2 / 1e6).toFixed(1); }

    document.getElementById("order_val").textContent = N;
    document.getElementById("fs_val").textContent = Math.round(fs / 1e6) + " MHz";
    document.getElementById("fc_val").textContent = (fc / 1e6).toFixed(1) + " MHz";
    document.getElementById("fc2_val").textContent = (fc2 / 1e6).toFixed(1) + " MHz";

    var h = designFIR(ftype, N, fc, fc2, fs, wtype);

    document.getElementById("m_order").textContent = "N=" + N + " (" + (N + 1) + " taps)";
    document.getElementById("m_delay").textContent = (N / 2) + " samples";
    document.getElementById("m_atten").textContent = winInfo[wtype].atten;
    document.getElementById("win_note").textContent = winInfo[wtype].note;

    var fmax = fs / 2;
    var npts = 500;
    var labels = [], magData = [], linData = [], phaseData = [];
    var transLow = -1, transHigh = -1;

    for (var i = 0; i <= npts; i++) {
        var f = (i / npts) * fmax;
        labels.push((f / 1e6).toFixed(1));
        var resp = freqResponse(h, f, fs);
        var db = toDb(resp.mag);
        magData.push(Math.round(db * 100) / 100);
        linData.push(Math.round(resp.mag * 10000) / 10000);
        phaseData.push(Math.round(resp.phase * 1000) / 1000);
        if (ftype === "lowpass") {
            if (transLow < 0 && db < -3) transLow = f;
            if (transHigh < 0 && db < -40) transHigh = f;
        }
    }
    if (ftype === "lowpass" && transLow > 0 && transHigh > 0) {
        document.getElementById("m_trans").textContent = ((transHigh - transLow) / 1e6).toFixed(1) + " MHz";
    } else {
        document.getElementById("m_trans").textContent = "--";
    }

    charts["chart_mag"].data.labels = labels;
    charts["chart_mag"].data.datasets[0].data = magData;
    charts["chart_mag"].update("none");
    charts["chart_linear"].data.labels = labels;
    charts["chart_linear"].data.datasets[0].data = linData;
    charts["chart_linear"].update("none");
    charts["chart_phase"].data.labels = labels;
    charts["chart_phase"].data.datasets[0].data = phaseData;
    charts["chart_phase"].update("none");

    var impLabels = [], impData = [];
    for (var n = 0; n < h.length; n++) {
        impLabels.push(n.toString());
        impData.push(Math.round(h[n] * 1e8) / 1e8);
    }
    charts["chart_impulse"].data.labels = impLabels;
    charts["chart_impulse"].data.datasets[0].data = impData;
    charts["chart_impulse"].update("none");

    var coeffStr = "FIR coefficients: N=" + N + ", type=" + ftype + ", window=" + wtype;
    coeffStr += ", fc=" + (fc/1e6).toFixed(1) + "MHz, fs=" + (fs/1e6) + "MHz\n";
    coeffStr += "sum(h) = " + h.reduce(function(a,b){return a+b;}, 0).toFixed(6) + " (DC gain)\n\n";
    for (var c = 0; c < h.length; c++) {
        coeffStr += "h[" + (c < 10 ? " " : "") + c + "] = " + (h[c] >= 0 ? " " : "") + h[c].toFixed(10);
        if (c < N && Math.abs(h[c] - h[N - c]) < 1e-10) {
            coeffStr += "   = h[" + (N - c) + "]";
        }
        coeffStr += "\n";
    }
    document.getElementById("coeff_text").textContent = coeffStr;

    var freqs;
    if (ftype === "lowpass") { freqs = [0, 1, 2, fc/1e6, 8, 10, 15]; }
    else if (ftype === "highpass") { freqs = [0, 0.5, 1, fc/1e6, 8, 10, 15]; }
    else { freqs = [0, fc/1e6, (fc/1e6+fc2/1e6)/2, fc2/1e6, 15, 18]; }
    var html = "<tr><th>频率 (MHz)</th><th>|H(f)|</th><th>dB</th><th>相位 (rad)</th></tr>";
    var seen = {};
    for (var j = 0; j < freqs.length; j++) {
        var ff = freqs[j] * 1e6;
        if (ff >= fs / 2 || ff < 0) continue;
        var key = freqs[j].toFixed(2);
        if (seen[key]) continue;
        seen[key] = true;
        var r = freqResponse(h, ff, fs);
        var isfc = (Math.abs(freqs[j] - fc / 1e6) < 0.05) || (ftype === "bandpass" && Math.abs(freqs[j] - fc2 / 1e6) < 0.05);
        var st = isfc ? ' style="font-weight:500;color:#cf222e;"' : '';
        html += "<tr" + st + "><td>" + (isfc ? freqs[j].toFixed(1) + " (fc)" : freqs[j].toFixed(1)) + "</td>";
        html += "<td>" + r.mag.toFixed(4) + "</td>";
        html += "<td>" + toDb(r.mag).toFixed(1) + "</td>";
        html += "<td>" + r.phase.toFixed(3) + "</td></tr>";
    }
    document.getElementById("freq_table").innerHTML = html;
}

document.getElementById("ftype").addEventListener("change", updateAll);
document.getElementById("wtype").addEventListener("change", updateAll);
document.getElementById("order_slider").addEventListener("input", updateAll);
document.getElementById("fs_slider").addEventListener("input", updateAll);
document.getElementById("fc_slider").addEventListener("input", updateAll);
document.getElementById("fc2_slider").addEventListener("input", updateAll);
updateAll();
</script>

</body>
</html>
